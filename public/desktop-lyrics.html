<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mineradio Desktop Lyrics</title>
  <style>
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent;user-select:none}
    body{font-family:"Microsoft YaHei","Noto Sans SC",system-ui,sans-serif}
    #stage{position:fixed;inset:0;width:100%;height:100%;display:block;pointer-events:none;transform:translateZ(0)}
    #hit{
      position:fixed;left:50%;top:50%;width:720px;height:190px;
      transform:translate(-50%,-50%);pointer-events:auto;cursor:move;
      border:1px solid transparent;border-radius:18px;
    }
    body.locked #hit{pointer-events:none}
    body.editing #hit{
      border-color:transparent;
      background:transparent;
      box-shadow:none;
    }
    #toolbar{
      display:none!important;
      position:absolute;left:50%;top:-42px;transform:translateX(-50%);
      height:34px;padding:0 8px;align-items:center;gap:6px;
      border:1px solid rgba(255,255,255,.22);border-radius:999px;
      background:rgba(8,11,15,.72);backdrop-filter:blur(18px) saturate(1.25);
      box-shadow:0 8px 28px rgba(0,0,0,.30);opacity:0;transition:opacity .16s;
    }
    body.editing #hit:hover #toolbar,body.editing #toolbar:focus-within{opacity:0}
    #toolbar button{
      height:24px;min-width:30px;padding:0 8px;border:0;border-radius:999px;
      color:#fff;background:rgba(255,255,255,.10);font:700 12px/1 inherit;cursor:pointer
    }
    #toolbar button:hover{background:rgba(255,255,255,.19)}
    #size-label{min-width:44px;text-align:center;color:rgba(255,255,255,.78);font:700 11px/1 inherit}
    .handle{position:absolute;display:none!important;opacity:0;pointer-events:none}
    body.editing .handle{display:none!important}
    .handle.n,.handle.s{left:18px;right:18px;height:12px}
    .handle.n{top:-6px;cursor:ns-resize}.handle.s{bottom:-6px;cursor:ns-resize}
    .handle.e,.handle.w{top:18px;bottom:18px;width:12px}
    .handle.e{right:-6px;cursor:ew-resize}.handle.w{left:-6px;cursor:ew-resize}
    .handle.nw,.handle.ne,.handle.sw,.handle.se{width:18px;height:18px}
    .handle.nw{left:-8px;top:-8px;cursor:nwse-resize}
    .handle.ne{right:-8px;top:-8px;cursor:nesw-resize}
    .handle.sw{left:-8px;bottom:-8px;cursor:nesw-resize}
    .handle.se{right:-8px;bottom:-8px;cursor:nwse-resize}
    .handle.nw::after,.handle.ne::after,.handle.sw::after,.handle.se::after{
      content:"";position:absolute;inset:4px;border:2px solid rgba(255,255,255,.72);border-radius:3px;
      box-shadow:0 0 10px rgba(255,255,255,.3)
    }
    #hint{
      position:fixed;left:50%;top:18px;transform:translateX(-50%) translateY(-8px);
      padding:8px 13px;border-radius:999px;color:#fff;background:rgba(5,8,12,.68);
      border:1px solid rgba(255,255,255,.18);font:700 12px/1 inherit;
      opacity:0;pointer-events:none;transition:opacity .18s,transform .18s
    }
    #hint.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body class="locked">
  <canvas id="stage"></canvas>
  <div id="hit">
    <div id="toolbar">
      <button id="smaller" type="button" title="缩小">−</button>
      <span id="size-label">100%</span>
      <button id="larger" type="button" title="放大">＋</button>
      <button id="reset" type="button">复位</button>
      <button id="lock" type="button">锁定</button>
      <button id="close" type="button">关闭</button>
    </div>
    <i class="handle n" data-dir="n"></i><i class="handle s" data-dir="s"></i>
    <i class="handle e" data-dir="e"></i><i class="handle w" data-dir="w"></i>
    <i class="handle nw" data-dir="nw"></i><i class="handle ne" data-dir="ne"></i>
    <i class="handle sw" data-dir="sw"></i><i class="handle se" data-dir="se"></i>
  </div>
  <div id="hint">中键切换锁定 · 解锁后左键拖动</div>
<script>
(function(){
  'use strict';
  var canvas=document.getElementById('stage'),ctx=canvas.getContext('2d',{alpha:true});
  var hit=document.getElementById('hit'),hint=document.getElementById('hint'),sizeLabel=document.getElementById('size-label');
  var dpr=1,w=0,h=0,frame=0,lastFrame=0,lastStageKey='',hintTimer=0,lastLocked=null,lineChangeAt=performance.now();
  var savedPosition=readJson('mineradio-desktop-lyrics-canvas-position-v2',{x:0,y:0});
  var state={
    text:'Mineradio',items:[],stageKey:'',progress:0,progressSpan:4.8,progressScale:1,
    progressAt:performance.now(),playing:false,size:1,opacity:.92,clickThrough:true,
    lyricMotion:true,lyricGlowParticles:true,cinema:true,highlightFollow:false,
    frameRate:60,fontFamily:'"Microsoft YaHei",sans-serif',fontWeight:900,
    letterSpacing:0,lineHeight:1,rows:'double',align:'center',lyricScale:1,feather:.055,
    colors:{primary:'#ff9fa7',secondary:'#ffc0b4',highlight:'#fff0df',glow:'#ff847f'},
    motion:{lyricGlow:true,lyricGlowBeat:true,lyricGlowStrength:.35,highBloom:0,beatGlow:0,beatPulse:0,bass:0},
    renderedGroups:[],x:Number(savedPosition.x)||0,y:Number(savedPosition.y)||0,
    timeline:[],timelineKey:'',playback:null,playbackAt:performance.now()
  };
  var particles=Array.from({length:9},function(_,i){return{a:i*.618%1,r:.22+(i*37%70)/100,s:.35+(i%7)*.08,z:.5+(i%5)*.13}});
  var smoothMotion={lyricGlowStrength:.25,highBloom:0,beatGlow:0,beatPulse:0,bass:0};
  var textLayerCache=new Map(),measureCache=new Map(),lastHitKey='',lastHotKey='',lastHotSent=0,perfFrame=0,lastColorKey='';

  function readJson(key,fallback){try{return JSON.parse(localStorage.getItem(key)||'null')||fallback}catch(e){return fallback}}
  function clamp(v,a,b,f){v=Number(v);return isFinite(v)?Math.max(a,Math.min(b,v)):f}
  function smooth01(v){v=clamp(v,0,1,0);return v*v*(3-2*v)}
  function easeOutBack(v){v=clamp(v,0,1,0);var c1=1.45,c3=c1+1;return 1+c3*Math.pow(v-1,3)+c1*Math.pow(v-1,2)}
  function escFont(v){return String(v||'"Microsoft YaHei",sans-serif')}
  function rgba(hex,a){
    var m=String(hex||'').match(/^#([0-9a-f]{6})$/i);
    if(!m)return 'rgba(255,255,255,'+a+')';
    var n=parseInt(m[1],16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';
  }
  function mix(a,b,t){
    function rgb(x){var m=String(x).match(/^#([0-9a-f]{6})$/i),n=m?parseInt(m[1],16):0xffffff;return[(n>>16)&255,(n>>8)&255,n&255]}
    var x=rgb(a),y=rgb(b),r=x.map(function(v,i){return Math.round(v+(y[i]-v)*t)});
    return '#'+r.map(function(v){return v.toString(16).padStart(2,'0')}).join('');
  }
  function rowLimit(){return({single:1,double:2,triple:3,quad:4})[state.rows]||2}
  function groups(){
    var out=[],map={};
    (Array.isArray(state.items)?state.items:[]).forEach(function(item,i){
      var key=String(item&&item.sourceIndex!=null?item.sourceIndex:(item&&item.id)||i);
      if(!map[key]){map[key]={key:key,role:item.role||'future',distance:Number(item.distance)||0,main:'',translation:''};out.push(map[key])}
      if(item.variant==='translation')map[key].translation=String(item.text||'');
      else if(!map[key].main)map[key].main=String(item.text||'');
    });
    out=out.filter(function(g){return g.main||g.translation});
    if(!out.length)out=String(state.text||'Mineradio').split(/\r?\n/).filter(Boolean).slice(0,rowLimit()).map(function(t,i){return{key:'f'+i,role:'current',distance:0,main:t,translation:''}});
    var limit=rowLimit(),cur=Math.max(0,out.findIndex(function(g){return g.role==='current'}));
    if(out.length>limit){var start=Math.max(0,Math.min(cur-(limit>=3?1:0),out.length-limit));out=out.slice(start,start+limit)}
    return out;
  }
  function resize(){
    w=innerWidth;h=innerHeight;
    var rawDpr=Math.max(1,devicePixelRatio||1),pixels=w*h*rawDpr;
    // 透明桌面窗口里高 DPR Canvas 很吃显卡。这里优先保证移动和律动顺滑。
    dpr=Math.min(pixels>2600000?1.25:1.5,rawDpr);
    canvas.width=Math.round(w*dpr);canvas.height=Math.round(h*dpr);canvas.style.width=w+'px';canvas.style.height=h+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);textLayerCache.clear();measureCache.clear();lastHitKey='';lastHotKey='';layoutHit();
  }
  function currentProgress(now){
    var p=state.progress;
    if(state.playing)p+=(now-state.progressAt)/1000/Math.max(.75,state.progressSpan)*state.progressScale;
    return clamp(p,0,1,0);
  }
  function timelineRows(text){
    return String(text||'').replace(/\r/g,'\n').split('\n').map(function(line){return line.replace(/[ \t]+/g,' ').trim()}).filter(Boolean);
  }
  function timelineStageIndices(currentIndex){
    var total=Array.isArray(state.timeline)?state.timeline.length:0,mode=state.rows||'double',candidates;
    if(mode==='single')candidates=[currentIndex];
    else if(mode==='double')candidates=[currentIndex,currentIndex+1];
    else if(mode==='triple')candidates=[currentIndex-1,currentIndex,currentIndex+1];
    else candidates=[currentIndex-1,currentIndex,currentIndex+1,currentIndex+2];
    var seen={};
    return candidates.filter(function(index){if(index<0||index>=total||seen[index])return false;seen[index]=true;return true});
  }
  function localPlaybackTime(now){
    var pb=state.playback||{};
    var t=Number(pb.time)||0;
    if(state.playing)t+=(now-(state.playbackAt||now))/1000*clamp(Number(pb.rate)||1,.25,4,1);
    var duration=Number(pb.duration)||0;
    if(duration>0)t=clamp(t,0,duration,t);
    return Math.max(0,t);
  }
  function updateFromLocalTimeline(now){
    now=now||performance.now();
    var timeline=Array.isArray(state.timeline)?state.timeline:[];
    if(!timeline.length||!state.playback)return;
    var t=localPlaybackTime(now),idx=-1;
    for(var i=0;i<timeline.length;i++){
      if((Number(timeline[i].t)||0)<=t+.05)idx=i;
      else break;
    }
    if(idx<0)idx=0;
    var cur=timeline[idx]||{t:t,text:state.text||''},next=timeline[idx+1];
    var curT=Number(cur.t)||0,nextT=next&&Number(next.t)>curT?Number(next.t):curT+(Number(cur.duration)||state.progressSpan||4.8);
    var span=Math.max(.75,nextT-curT);
    var indices=timelineStageIndices(idx),items=[];
    indices.forEach(function(sourceIndex){
      var source=timeline[sourceIndex]||{},rows=timelineRows(source.text).slice(0,2);
      if(!rows.length&&sourceIndex===idx)rows=timelineRows(state.text||'Mineradio').slice(0,rowLimit());
      var distance=sourceIndex-idx,role=distance<0?'past':(distance>0?'future':'current');
      rows.forEach(function(row,rowIndex){
        items.push({id:sourceIndex+':'+rowIndex+':'+row,text:row,role:role,distance:distance,sourceIndex:sourceIndex,variant:rowIndex===0?'main':'translation'});
      });
    });
    if(!items.length)return;
    var stageKey=items.map(function(item){return item.id+':'+item.role}).join('|');
    if(stageKey!==state.stageKey){state.stageKey=stageKey;lineChangeAt=now;}
    state.items=items;
    var currentRows=items.filter(function(item){return item.role==='current'}).map(function(item){return item.text});
    state.text=currentRows.join('\n')||items.map(function(item){return item.text}).join('\n')||state.text;
    state.progress=clamp((t-curT)/span,0,1,0);
    state.progressAt=now;
    state.progressSpan=span;
    state.progressScale=1;
  }
  function updateSmoothMotion(){
    var src=state.motion||{};
    ['lyricGlowStrength','highBloom','beatGlow','beatPulse','bass'].forEach(function(k){
      var target=Number(src[k])||0, prev=Number(smoothMotion[k])||0;
      var speed=target>prev?.10:.055;
      smoothMotion[k]=prev+(target-prev)*speed;
    });
  }
  function fontSize(){
    var base=Math.min(w*.058,h*.115,92);
    return clamp(base*state.size*state.lyricScale,24,230,64);
  }
  function measure(text,size,weight){
    text=String(text||'');
    var key=[text,Math.round(size*10),weight||state.fontWeight,state.fontFamily,Math.round(state.letterSpacing*1000)].join('|');
    if(measureCache.has(key))return measureCache.get(key);
    ctx.save();ctx.font=(weight||state.fontWeight)+' '+size+'px '+escFont(state.fontFamily);
    var width=ctx.measureText(text).width+Math.max(0,Array.from(text).length-1)*size*state.letterSpacing;ctx.restore();
    measureCache.set(key,width);if(measureCache.size>180)measureCache.delete(measureCache.keys().next().value);
    return width;
  }
  function fitSize(text,size,max){
    var width=measure(text,size);return width>max?size*max/width:size;
  }
  function layout(now){
    now=now||performance.now();
    updateFromLocalTimeline(now);
    var gs=groups(),base=fontSize(),maxW=w*.88,lines=[],total=0,gap=base*.18;
    var progress=currentProgress(now),handoff=smooth01((progress-.58)/.38);
    gs.forEach(function(g,idx){
      var current=g.role==='current',dist=Math.abs(Number(g.distance)||0);
      var scale=current?1:(dist>1?.58:.70);
      if(g.role==='future'&&dist<=1)scale+=handoff*.055;
      var mainSize=fitSize(g.main||g.translation,base*scale,maxW);
      var transSize=g.translation?fitSize(g.translation,mainSize*.66,maxW):0;
      var gh=mainSize*1.10+(transSize?transSize*.96:0);
      var enter=easeOutBack((now-lineChangeAt-idx*62)/640);
      lines.push({group:g,mainSize:mainSize,transSize:transSize,height:gh,current:current,enter:enter,handoff:handoff,index:idx});
      total+=gh;
    });
    total+=Math.max(0,lines.length-1)*gap;
    var cy=h*.50,y=cy-total/2;
    lines.forEach(function(line){line.y=y;line.centerY=y+line.height/2;y+=line.height+gap});
    return{lines:lines,total:total,base:base,maxW:maxW,progress:progress,handoff:handoff,cx:w/2,cy:cy};
  }
  function textX(text,size,cx){
    var mw=measure(text,size);
    if(state.align==='left')return Math.max(30,cx-w*.37);
    if(state.align==='right')return Math.min(w-30,cx+w*.37)-mw;
    return cx-mw/2;
  }
  function makeTextLayer(text,size){
    var cacheKey=[text,Math.round(size*10),state.fontFamily,state.fontWeight,Math.round(state.letterSpacing*1000),state.colors.primary].join('|');
    if(textLayerCache.has(cacheKey))return textLayerCache.get(cacheKey);
    var pad=Math.ceil(size*1.25),tw=Math.ceil(measure(text,size)),cw=Math.max(8,tw+pad*2),ch=Math.ceil(size*2.2);
    var c=document.createElement('canvas');c.width=Math.ceil(cw*dpr);c.height=Math.ceil(ch*dpr);
    var color=document.createElement('canvas');color.width=c.width;color.height=c.height;
    var x=c.getContext('2d');x.setTransform(dpr,0,0,dpr,0,0);
    x.font=state.fontWeight+' '+size+'px '+escFont(state.fontFamily);x.textBaseline='middle';x.textAlign='left';
    if(state.letterSpacing&&x.letterSpacing!==undefined)x.letterSpacing=(size*state.letterSpacing)+'px';
    var py=ch/2;
    x.lineJoin='round';
    // 先用较宽的深色描边做抗动态壁纸底托，再叠亮色细描边。
    // 这样鱼/视频背景移动时不会把桌面歌词吃掉。
    x.shadowColor='rgba(0,0,0,.58)';x.shadowBlur=Math.max(7,size*.075);x.shadowOffsetY=Math.max(1,size*.012);
    x.strokeStyle='rgba(0,0,0,.52)';x.lineWidth=Math.max(2.4,size*.034);x.strokeText(text,pad,py);
    x.shadowColor='transparent';x.shadowBlur=0;x.shadowOffsetY=0;
    x.strokeStyle=rgba(mix(state.colors.primary,'#ffffff',.62),.96);x.lineWidth=Math.max(1.1,size*.016);
    x.strokeText(text,pad,py);
    x.fillStyle='#fff';x.fillText(text,pad,py);
    var result={canvas:c,color:color,w:cw,h:ch,pad:pad,textW:tw};
    textLayerCache.set(cacheKey,result);
    if(textLayerCache.size>48)textLayerCache.delete(textLayerCache.keys().next().value);
    return result;
  }
  function paintText(text,size,x,y,role,progress,alpha,now){
    if(!text)return;
    var layer=makeTextLayer(text,size),lw=layer.w,lh=layer.h,dx=x-layer.pad,dy=y+size*.55-lh/2;
    var motion=smoothMotion||state.motion||{},pulse=clamp((motion.beatPulse||0)*.16+(motion.bass||0)*.08,0,.16,0);
    var glow=clamp((motion.lyricGlowStrength||0)+(.10*(motion.beatGlow||0))+(.08*(motion.highBloom||0)),0,1.0,.25);
    ctx.save();ctx.globalAlpha=alpha*state.opacity;
    if(role==='current'){
      ctx.save();ctx.filter='blur('+Math.max(4,size*(.065+.020*glow))+'px)';ctx.globalAlpha*=.34+.12*glow;
      ctx.drawImage(layer.canvas,dx-size*.01,dy-size*.01,lw*(1+.018*pulse),lh*(1+.018*pulse));ctx.restore();
    }else{
      ctx.filter='blur('+(role==='past'?.65:.25)+'px)';
    }
    var colorCtx=layer.color.getContext('2d');
    colorCtx.setTransform(1,0,0,1,0,0);colorCtx.clearRect(0,0,layer.color.width,layer.color.height);
    colorCtx.setTransform(dpr,0,0,dpr,0,0);
    var grad=colorCtx.createLinearGradient(layer.pad,0,layer.pad+layer.textW,0);
    if(role==='current'){
      var p=clamp(progress,0,1,0),f=clamp(state.feather,.025,.09,.055),shine=.012;
      grad.addColorStop(0,mix(state.colors.primary,state.colors.highlight,.86));
      grad.addColorStop(Math.max(0,p-f),mix(state.colors.primary,state.colors.highlight,.86));
      grad.addColorStop(Math.max(0,p-shine),mix(state.colors.highlight,'#ffffff',.66));
      grad.addColorStop(p,'#ffffff');
      grad.addColorStop(Math.min(1,p+shine),mix(state.colors.glow,'#ffffff',.78));
      grad.addColorStop(Math.min(1,p+f),state.colors.primary);
      grad.addColorStop(1,state.colors.secondary);
    }else{
      grad.addColorStop(0,state.colors.primary);grad.addColorStop(1,state.colors.secondary);
    }
    colorCtx.fillStyle=grad;colorCtx.fillRect(0,0,lw,lh);
    colorCtx.globalCompositeOperation='destination-in';
    colorCtx.drawImage(layer.canvas,0,0,lw,lh);
    colorCtx.globalCompositeOperation='source-over';
    ctx.filter='none';ctx.drawImage(layer.color,dx,dy,lw,lh);ctx.restore();
    if(role==='current'&&state.highlightFollow){
      var sx=x+layer.textW*progress;
      var shineGrad=ctx.createRadialGradient(sx,y+size*.52,0,sx,y+size*.52,size*.34);
      shineGrad.addColorStop(0,rgba(state.colors.highlight,.16));shineGrad.addColorStop(1,rgba(state.colors.highlight,0));
      ctx.save();ctx.globalCompositeOperation='lighter';ctx.fillStyle=shineGrad;ctx.fillRect(sx-size*.38,y-size*.1,size*.76,size*1.2);ctx.restore();
    }
  }
  function drawParticles(lay,now){
    if(!state.lyricGlowParticles||perfFrame%2)return;
    var current=lay.lines.find(function(l){return l.current});if(!current)return;
    var motion=smoothMotion||state.motion||{},drive=.10+clamp((motion.beatGlow||0)*.10+(motion.highBloom||0)*.06,0,.22,0);
    ctx.save();ctx.globalCompositeOperation='lighter';
    particles.forEach(function(p,i){
      var t=now*.000035*p.s+i*2.31,rx=lay.maxW*(.20+p.r*.38),ry=current.height*(.55+p.z);
      var x=lay.cx+Math.cos(t*6.28)*rx,y=current.centerY+Math.sin(t*5.1+i)*ry;
      var r=1.0+p.z*1.9+drive*1.4,g=ctx.createRadialGradient(x,y,0,x,y,r*2.7);
      g.addColorStop(0,rgba(state.colors.highlight,.34*drive));g.addColorStop(1,rgba(state.colors.glow,0));
      ctx.fillStyle=g;ctx.fillRect(x-r*2.7,y-r*2.7,r*5.4,r*5.4);
    });ctx.restore();
  }
  function drawProgressAura(lay,line,now){
    var motion=smoothMotion||state.motion||{},drive=clamp((motion.beatGlow||0)*.10+(motion.highBloom||0)*.08+(motion.beatPulse||0)*.05,0,.28,0);
    if(drive<=.015&&!line.current)return;
    var p=clamp(lay.progress,0,1,0),x=lay.cx-lay.maxW*.38+lay.maxW*.76*p,y=line.centerY;
    var rx=lay.maxW*(.10+.05*drive),ry=line.height*(.40+.14*drive);
    var grad=ctx.createRadialGradient(x,y,0,x,y,Math.max(rx,ry));
    grad.addColorStop(0,rgba(state.colors.highlight,.20+.20*drive));
    grad.addColorStop(.42,rgba(state.colors.glow,.08+.12*drive));
    grad.addColorStop(1,rgba(state.colors.glow,0));
    ctx.save();ctx.globalCompositeOperation='lighter';ctx.translate(x,y);ctx.scale(rx/Math.max(rx,ry),ry/Math.max(rx,ry));ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,Math.max(rx,ry),0,Math.PI*2);ctx.fill();ctx.restore();
  }
  function draw(now){
    frame=requestAnimationFrame(draw);
    var fps=Number(state.frameRate)||60;fps=Math.max(30,Math.min(60,fps||60));
    var step=1000/fps,elapsed=now-lastFrame;if(elapsed<step-1.5)return;lastFrame=now-(elapsed%step);perfFrame++;
    updateSmoothMotion();
    ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,w,h);
    var lay=layout(now),motion=smoothMotion||state.motion||{};
    var beat=clamp((motion.beatPulse||0)*.28+(motion.bass||0)*.14+(motion.beatGlow||0)*.16,0,.55,0);
    var floatY=state.lyricMotion===false?0:Math.sin(now*.00115)*3.4+Math.sin(now*.00047)*2.0;
    drawParticles(lay,now);
    var current=lay.lines.find(function(l){return l.current});if(current)drawProgressAura(lay,current,now);
    lay.lines.forEach(function(line){
      var g=line.group,dist=Math.abs(Number(g.distance)||0),future=g.role==='future',past=g.role==='past';
      var main=g.main||g.translation,mainX=textX(main,line.mainSize,lay.cx);
      var enter=clamp(line.enter,0,1,1),previewLift=future?lay.handoff*(dist<=1?18:8):0;
      var alpha=line.current?1:(past?.18:(dist>1?.24:.36+lay.handoff*.16));
      alpha*=smooth01(enter);
      var yShift=(1-enter)*(line.current?24:16)-previewLift+(line.current?floatY:floatY*.35);
      var scale=line.current?(1+beat*.018):(1+(future&&dist<=1?lay.handoff*.018:0));
      var rot=state.lyricMotion===false?0:((line.current?1:.35)*Math.sin(now*.00072+line.index)*.006 + beat*(line.current?.004:.001));
      ctx.save();
      ctx.translate(lay.cx,line.centerY+yShift);ctx.rotate(rot);ctx.scale(scale,scale);ctx.translate(-lay.cx,-line.centerY);
      if(line.current&&state.lyricMotion!==false){
        paintText(main,line.mainSize,mainX,line.y+5,g.role,lay.progress,alpha*.030,now);
      }
      paintText(main,line.mainSize,mainX,line.y,g.role,line.current?lay.progress:0,alpha,now);
      if(g.translation&&g.translation!==main){
        var ty=line.y+line.mainSize*1.02,tx=textX(g.translation,line.transSize,lay.cx);
        paintText(g.translation,line.transSize,tx,ty,g.role,line.current?lay.progress:0,alpha*(line.current?.88:.68),now);
      }
      ctx.restore();
    });
    updateHit(lay);
  }
  function updateHit(lay){
    var width=Math.round(Math.min(w-24,Math.max(330,lay.maxW+50))),height=Math.round(Math.min(h-24,Math.max(120,lay.total+56)));
    var left=Math.round(lay.cx),top=Math.round(lay.cy);
    var key=width+'|'+height+'|'+left+'|'+top;
    if(key!==lastHitKey){
      lastHitKey=key;hit.style.width=width+'px';hit.style.height=height+'px';hit.style.left=left+'px';hit.style.top=top+'px';sendHotBounds(true);
    }else{
      sendHotBounds(false);
    }
  }
  var hotTimer=0;
  function sendHotBounds(force){
    var now=performance.now();
    if(!force&&now-lastHotSent<180)return;
    if(hotTimer)return;hotTimer=requestAnimationFrame(function(){
      hotTimer=0;if(!window.desktopOverlay||!desktopOverlay.setLyricsHotBounds)return;
      var r=hit.getBoundingClientRect();
      var key=[Math.round(r.left),Math.round(r.top),Math.round(r.right),Math.round(r.bottom)].join('|');
      if(!force&&key===lastHotKey)return;
      lastHotKey=key;lastHotSent=performance.now();
      desktopOverlay.setLyricsHotBounds({left:r.left,top:r.top,right:r.right,bottom:r.bottom}).catch(function(){});
    });
  }
  function layoutHit(){sendHotBounds()}
  function showHint(text){
    hint.textContent=text||'中键切换锁定 · 解锁后左键拖动，不阻挡桌面';hint.classList.add('show');
    clearTimeout(hintTimer);hintTimer=setTimeout(function(){hint.classList.remove('show')},1800);
  }
  function applyLock(locked){
    locked=!!locked;
    if(lastLocked===locked&&state.clickThrough===locked)return;
    state.clickThrough=locked;
    document.body.classList.toggle('locked',locked);document.body.classList.toggle('editing',!locked);
    // 只在真正锁定/解锁时刷新热区。之前每次歌词状态同步都强制刷新，
    // 会造成透明窗口穿透/热区 IPC 高频抖动，表现成频闪和拖动不顺。
    lastHitKey='';
    requestAnimationFrame(function(){ sendHotBounds(true); });
    lastLocked=locked;
    if(window.desktopOverlay&&desktopOverlay.setLyricsPointerCapture)desktopOverlay.setLyricsPointerCapture(false).catch(function(){});
    showHint(locked?'桌面歌词已锁定 · 中键解锁':'已解锁 · 左键拖动歌词，滚轮调大小');
  }
  function setSize(next,notify){
    var old=state.size;
    state.size=clamp(next,.5,4,1);sizeLabel.textContent=Math.round(state.size*100)+'%';
    if(Math.abs(old-state.size)>0.001){
      lastHitKey='';
      requestAnimationFrame(function(){ sendHotBounds(true); });
    }
    if(notify&&window.desktopOverlay&&desktopOverlay.setLyricsSize)desktopOverlay.setLyricsSize(state.size).catch(function(){});
  }
  function savePosition(){localStorage.setItem('mineradio-desktop-lyrics-canvas-position-v2',JSON.stringify({x:state.x,y:state.y}))}
  function resetStage(){
    state.x=0;state.y=0;setSize(1,true);savePosition();showHint('大小已复位');
  }
  function applyState(next){
    next=next||{};
    var hasTimeline=Array.isArray(next.timeline)&&next.timeline.length>0;
    var changed=!hasTimeline&&next.stageKey&&next.stageKey!==lastStageKey;
    Object.keys(next).forEach(function(k){
      if(k==='progress'||k==='motion'||k==='colors'||k==='x'||k==='y')return;
      // 有完整时间轴时，歌词窗口自己计算当前行和进度。不要用主窗口低频状态反复覆盖，
      // 否则会在本地推进和主窗口推送之间来回跳，表现成频闪。
      if(hasTimeline&&(k==='text'||k==='items'||k==='stageKey'||k==='progressSpan'||k==='progressScale'))return;
      if(k==='timeline')return;
      state[k]=next[k];
    });
    if(next.colors){
      var merged=Object.assign({},state.colors,next.colors);
      var colorKey=[merged.primary,merged.secondary,merged.highlight,merged.glow].join('|');
      state.colors=merged;
      if(colorKey!==lastColorKey){lastColorKey=colorKey;textLayerCache.clear();}
    }
    if(next.motion)state.motion=Object.assign({},state.motion,next.motion);
    if(Array.isArray(next.timeline))state.timeline=next.timeline;
    if(next.playback){state.playback=Object.assign({},next.playback);state.playbackAt=performance.now();}
    if(!hasTimeline){
      state.progress=clamp(next.progress,0,1,state.progress);state.progressAt=performance.now();
      state.progressSpan=clamp(next.progressSpan,.75,18,4.8);state.progressScale=clamp(next.progressScale,.05,1,1);
    }
    var oldFontKey=[state.fontWeight,state.letterSpacing,state.lyricScale,state.fontFamily].join('|');
    state.fontWeight=Math.round(clamp(next.fontWeight,500,900,900)/50)*50;
    state.letterSpacing=clamp(next.letterSpacing,-.04,.18,0);state.lyricScale=clamp(next.lyricScale,.35,1.65,1);
    if(oldFontKey!==[state.fontWeight,state.letterSpacing,state.lyricScale,state.fontFamily].join('|')){textLayerCache.clear();measureCache.clear();lastHitKey='';}
    state.opacity=clamp(next.opacity,.28,1,.92);state.feather=clamp(next.feather,.025,.09,.055);
    if(changed){lastStageKey=next.stageKey;state.progressAt=performance.now();lineChangeAt=performance.now()}
    setSize(state.size,false);
    var nextLocked=state.clickThrough!==false;
    if(lastLocked!==nextLocked)applyLock(nextLocked);
  }
  var gesture=null;
  var moveDragActive=false,lastDragPaintAt=0;
  hit.addEventListener('pointerdown',function(e){
    if(state.clickThrough||e.button!==0||e.target.closest('button'))return;
    gesture=null;moveDragActive=false;
  });
  hit.addEventListener('pointermove',function(e){
    return;
  });
  function endGesture(e){
    gesture=null;moveDragActive=false;
  }
  hit.addEventListener('pointerup',endGesture);hit.addEventListener('pointercancel',endGesture);
  hit.addEventListener('wheel',function(e){
    if(state.clickThrough)return;
    var step=e.deltaY<0?.08:-.08;
    setSize(state.size+step,true);
    showHint('桌面歌词大小 '+Math.round(state.size*100)+'%');
    e.preventDefault();
  },{passive:false});
  hit.addEventListener('contextmenu',function(e){e.preventDefault()});
  hit.addEventListener('dblclick',function(e){
    if(state.clickThrough)return;
    resetStage();
    e.preventDefault();
  });
  document.getElementById('smaller').onclick=function(e){e.stopPropagation();setSize(state.size-.1,true)};
  document.getElementById('larger').onclick=function(e){e.stopPropagation();setSize(state.size+.1,true)};
  document.getElementById('reset').onclick=function(e){e.stopPropagation();resetStage()};
  document.getElementById('lock').onclick=function(e){e.stopPropagation();if(window.desktopOverlay&&desktopOverlay.setLyricsLockState)desktopOverlay.setLyricsLockState(true).catch(function(){});applyLock(true)};
  document.getElementById('close').onclick=function(e){e.stopPropagation();if(window.desktopOverlay&&desktopOverlay.closeLyrics)desktopOverlay.closeLyrics().catch(function(){})};
  window.__mineradioDesktopLyricsApplyState=applyState;
  window.addEventListener('message',function(e){if(e.data&&e.data.type==='mineradio-desktop-lyrics-state')applyState(e.data.payload||{})});
  window.addEventListener('resize',resize);
  if(window.desktopOverlay&&desktopOverlay.onLyricsState)desktopOverlay.onLyricsState(applyState);
  resize();requestAnimationFrame(draw);showHint();
})();
</script>
